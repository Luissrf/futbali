<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b6e2c">
<title>FUTBALI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="game-wrap">
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-team" id="hud-team-a">
      <span class="hud-badge badge-a"></span>
      <span id="hud-name-a">AZUL</span>
      <span id="score-a">0</span>
    </div>
    <div class="hud-clock">
      <div id="clock">02:00</div>
      <div id="half-label">1ER TIEMPO</div>
    </div>
    <div class="hud-team" id="hud-team-b">
      <span id="score-b">0</span>
      <span id="hud-name-b">ROJO</span>
      <span class="hud-badge badge-b"></span>
    </div>
    <button id="btn-pause" aria-label="Pausa">II</button>
  </div>

  <!-- Touch controls -->
  <div id="controls">
    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-stick"></div>
      </div>
    </div>
    <div id="action-zone">
      <button id="btn-switch" class="action-btn small">CAMBIAR</button>
      <button id="btn-shoot" class="action-btn big">TIRO</button>
    </div>
  </div>

  <!-- Power meter -->
  <div id="power-meter"><div id="power-fill"></div></div>

  <!-- Overlays -->
  <div id="overlay-menu" class="overlay">
    <div class="overlay-card menu-card">
      <h1 id="game-title">FUTBALI</h1>
      <p class="subtitle">Fútbol arcade</p>

      <div class="picker-row">
        <div class="picker-label">Tu equipo <span id="pick-a-name">Brasil</span></div>
        <div class="country-grid" id="grid-team-a"></div>
      </div>
      <div class="picker-row">
        <div class="picker-label">Rival <span id="pick-b-name">Argentina</span></div>
        <div class="country-grid" id="grid-team-b"></div>
      </div>

      <button id="btn-play" class="menu-btn primary">JUGAR</button>
      <div class="hint">Joystick para moverte · botón TIRO (mantené para más potencia) · CAMBIAR para elegir jugador</div>
    </div>
  </div>

  <div id="overlay-goal" class="overlay hidden">
    <div class="overlay-card small">
      <h2 id="goal-text">¡GOOOOL!</h2>
    </div>
  </div>

  <div id="overlay-pause" class="overlay hidden">
    <div class="overlay-card">
      <h2>PAUSA</h2>
      <button id="btn-resume" class="menu-btn primary">CONTINUAR</button>
      <button id="btn-restart" class="menu-btn">REINICIAR</button>
    </div>
  </div>

  <div id="overlay-fulltime" class="overlay hidden">
    <div class="overlay-card">
      <h2 id="fulltime-title">FINAL DEL PARTIDO</h2>
      <div id="fulltime-score">0 - 0</div>
      <button id="btn-play-again" class="menu-btn primary">JUGAR DE NUEVO</button>
    </div>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/field.js"></script>
<script src="js/countries.js"></script>
<script src="js/entities.js"></script>
<script src="js/ai.js"></script>
<script src="js/input.js"></script>
<script src="js/commentary.js"></script>
<script src="js/easter-eggs.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
